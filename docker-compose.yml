services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      VIDBEE_API_HOST: 0.0.0.0
      VIDBEE_API_PORT: ${VIDBEE_API_PORT:-1708}
      VIDBEE_DOWNLOAD_DIR: /data/downloads
      VIDBEE_HISTORY_STORE_PATH: /data/vidbee/vidbee.db
    ports:
      - "${VIDBEE_API_PORT:-1708}:${VIDBEE_API_PORT:-1708}"
    volumes:
      - vidbee-downloads:/data/downloads
      - vidbee-data:/data/vidbee
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${VIDBEE_API_PORT:-1708}/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:${VIDBEE_API_PORT:-1708}}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${VIDBEE_WEB_PORT:-1707}:1707"
    restart: unless-stopped

volumes:
  vidbee-downloads:
  vidbee-data:
